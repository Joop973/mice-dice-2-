# Continuous Integration: Lint, Formatierung, Typecheck, Unit-Tests, Build und
# (separat) Playwright-E2E. Läuft bei Push auf main/claude-Branches und bei PRs.

name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run typecheck:server
      - run: npm test
      - run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
