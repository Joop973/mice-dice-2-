# Baut die PWA und veröffentlicht sie auf GitHub Pages.
#
# Einrichtung (einmalig): Repo → Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". Danach deployt jeder Push auf `main` (oder ein
# manueller Start) die statische App.
#
# Hinweis: Dies hostet nur den statischen Client (Solo, Pass-and-Play, Offline
# und Online über den lokalen Loopback). Echter Online-Mehrspieler braucht den
# WebSocket-Server (server/) auf einem Node-Host; siehe README.

name: Deploy PWA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Laufende Deploys nicht abbrechen, neue dahinter einreihen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
